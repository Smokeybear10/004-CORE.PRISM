<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #fbfaf6;
  --navy: #0a1d36;
  --ink: #0d1320;
  --ink-quiet: #6a6e7c;
  --oxblood: #7a1f1f;
  --d1: #C8442C;
  --d2: #E89B4A;
  --d3: #D4B85A;
  --d4: #5A8DA8;
  --d5: #3D4A6B;
  --serif: 'Source Serif 4', Georgia, serif;
  --mono: 'JetBrains Mono', ui-monospace, monospace;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background:
    radial-gradient(ellipse at 50% 40%, #fffefb 0%, var(--paper) 55%, #f0eee5 100%);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.bg-prism {
  position: fixed;
  pointer-events: none;
  width: 700px;
  height: 700px;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  opacity: 0.05;
  background: conic-gradient(from 0deg, var(--d1), var(--d2), var(--d3), var(--d4), var(--d5), var(--d1));
  filter: blur(80px);
  animation: bg-spin 80s linear infinite;
  z-index: 0;
}
@keyframes bg-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

.stage {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  gap: 32px;
}

/* ───────── Horizontal row of 5 colored bars (appears after the prism animation finishes) ───────── */
.dim-row {
  display: flex;
  gap: 24px;
  width: 78vw;
  max-width: 1280px;
  opacity: 0;
  transform: translateY(-8px);
  animation: row-rise 900ms 4400ms ease forwards;
}
@keyframes row-rise {
  to { opacity: 1; transform: translateY(0); }
}
.dim-bar {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.dim-bar .stripe {
  width: 100%;
  height: 6px;
  border-radius: 3px;
}
.dim-bar:nth-child(1) .stripe { background: var(--d1); }
.dim-bar:nth-child(2) .stripe { background: var(--d2); }
.dim-bar:nth-child(3) .stripe { background: var(--d3); }
.dim-bar:nth-child(4) .stripe { background: var(--d4); }
.dim-bar:nth-child(5) .stripe { background: var(--d5); }
.dim-bar .tag {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
.dim-bar:nth-child(1) .tag { color: var(--d1); }
.dim-bar:nth-child(2) .tag { color: var(--d2); }
.dim-bar:nth-child(3) .tag { color: var(--d3); }
.dim-bar:nth-child(4) .tag { color: var(--d4); }
.dim-bar:nth-child(5) .tag { color: var(--d5); }

/* ───────── Prism stage ───────── */
.prism-stage {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.prism-stage svg {
  width: 78vw;
  max-width: 1280px;
  height: auto;
  display: block;
}

/* Animation runs once and stays (forwards) */
.va-anat svg .anat-in {
  transform-origin: 40px 0;
  transform: scaleX(0);
  animation: anat-in-rect 1300ms ease forwards;
}
@keyframes anat-in-rect {
  to { transform: scaleX(1); opacity: 1; }
}
.va-anat svg .anat-prism {
  opacity: 0;
  animation: anat-fade-once 600ms 1100ms ease forwards;
}
.va-anat svg .anat-out {
  stroke-dasharray: 360; stroke-dashoffset: 360;
  opacity: 0;
}
.va-anat svg .anat-out.o1 { animation: anat-out-once 1400ms 1700ms ease forwards; }
.va-anat svg .anat-out.o2 { animation: anat-out-once 1400ms 1780ms ease forwards; }
.va-anat svg .anat-out.o3 { animation: anat-out-once 1400ms 1860ms ease forwards; }
.va-anat svg .anat-out.o4 { animation: anat-out-once 1400ms 1940ms ease forwards; }
.va-anat svg .anat-out.o5 { animation: anat-out-once 1400ms 2020ms ease forwards; }
.va-anat svg .anat-label { opacity: 0; }
.va-anat svg .anat-label.l1 { animation: anat-fade-once 600ms 2700ms ease forwards; }
.va-anat svg .anat-label.l2 { animation: anat-fade-once 600ms 2780ms ease forwards; }
.va-anat svg .anat-label.l3 { animation: anat-fade-once 600ms 2860ms ease forwards; }
.va-anat svg .anat-label.l4 { animation: anat-fade-once 600ms 2940ms ease forwards; }
.va-anat svg .anat-label.l5 { animation: anat-fade-once 600ms 3020ms ease forwards; }
@keyframes anat-out-once {
  to { stroke-dashoffset: 0; opacity: 1; }
}
@keyframes anat-fade-once {
  to { opacity: 1; }
}

/* ─── CTA button: appears after stack ─── */
.cta-btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  padding: 22px 48px;
  background: var(--navy);
  color: var(--paper);
  border: none;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 14px;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  text-decoration: none;
  cursor: pointer;
  transition: background 200ms, transform 200ms, box-shadow 200ms;
  box-shadow: 0 8px 24px rgba(10, 29, 54, 0.20);

  opacity: 0;
  transform: translateY(8px);
  animation: cta-rise 800ms 5400ms ease forwards;
}
@keyframes cta-rise {
  to { opacity: 1; transform: translateY(0); }
}
.cta-btn:hover {
  background: var(--oxblood);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(122, 31, 31, 0.28);
}
.cta-btn .arrow { transition: transform 200ms; font-size: 14px; }
.cta-btn:hover .arrow { transform: translateX(6px); }
</style>
</head>
<body>

<div class="bg-prism"></div>

<div class="stage">

  <!-- 5 horizontal colored bars side-by-side — the relocated output beams -->
  <div class="dim-row">
    <div class="dim-bar"><div class="stripe"></div><span class="tag">Demand</span></div>
    <div class="dim-bar"><div class="stripe"></div><span class="tag">Pricing</span></div>
    <div class="dim-bar"><div class="stripe"></div><span class="tag">Competitive</span></div>
    <div class="dim-bar"><div class="stripe"></div><span class="tag">Mgmt</span></div>
    <div class="dim-bar"><div class="stripe"></div><span class="tag">Macro</span></div>
  </div>

  <!-- Prism diagram — plays once and stays in final state -->
  <main class="prism-stage va-anat">
    <svg viewBox="0 60 900 260" xmlns="http://www.w3.org/2000/svg">
      <!-- Incoming single black bar -->
      <rect class="anat-in" x="40" y="178" width="280" height="22" fill="#0a1d36" rx="2"/>

      <!-- Prism shape -->
      <polygon class="anat-prism" points="320,90 320,290 460,190"
               fill="rgba(10,29,54,0.04)" stroke="#0a1d36" stroke-width="1.6"/>

      <!-- 5 outgoing beams (equal weight) -->
      <line class="anat-out o1" x1="460" y1="190" x2="800" y2="80"
            stroke="#C8442C" stroke-width="5" stroke-linecap="round"/>
      <line class="anat-out o2" x1="460" y1="190" x2="800" y2="135"
            stroke="#E89B4A" stroke-width="5" stroke-linecap="round"/>
      <line class="anat-out o3" x1="460" y1="190" x2="800" y2="190"
            stroke="#D4B85A" stroke-width="5" stroke-linecap="round"/>
      <line class="anat-out o4" x1="460" y1="190" x2="800" y2="245"
            stroke="#5A8DA8" stroke-width="5" stroke-linecap="round"/>
      <line class="anat-out o5" x1="460" y1="190" x2="800" y2="300"
            stroke="#3D4A6B" stroke-width="5" stroke-linecap="round"/>

      <!-- Tags -->
      <text class="anat-label l1" x="810" y="78" font-family="JetBrains Mono, monospace"
            font-size="11" font-weight="600" fill="#C8442C" letter-spacing="0.10em">DEMAND</text>
      <text class="anat-label l2" x="810" y="133" font-family="JetBrains Mono, monospace"
            font-size="11" font-weight="600" fill="#E89B4A" letter-spacing="0.10em">PRICING</text>
      <text class="anat-label l3" x="810" y="190" font-family="JetBrains Mono, monospace"
            font-size="11" font-weight="600" fill="#D4B85A" letter-spacing="0.10em">COMPETITIVE</text>
      <text class="anat-label l4" x="810" y="247" font-family="JetBrains Mono, monospace"
            font-size="11" font-weight="600" fill="#5A8DA8" letter-spacing="0.10em">MGMT</text>
      <text class="anat-label l5" x="810" y="302" font-family="JetBrains Mono, monospace"
            font-size="11" font-weight="600" fill="#3D4A6B" letter-spacing="0.10em">MACRO</text>
    </svg>
  </main>

  <a class="cta-btn" href="index.html">Open the desk <span class="arrow">→</span></a>

</div>

</body>
</html>
