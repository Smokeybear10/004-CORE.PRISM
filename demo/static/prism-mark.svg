<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PRISM">
  <title>PRISM</title>
  <!-- White light entering the prism from the left -->
  <rect x="0" y="29" width="14" height="6" fill="#0a1d36"/>
  <!-- Triangular prism — base on the left, apex pointing right -->
  <polygon points="14,12 14,52 44,32" fill="rgba(10,29,54,0.06)" stroke="#0a1d36" stroke-width="2"/>
  <!-- Five refracted beams fanning from the apex, in spectrum order -->
  <g stroke-linecap="round" fill="none">
    <line x1="44" y1="32" x2="64" y2="10" stroke="#C8442C" stroke-width="3"/>
    <line x1="44" y1="32" x2="64" y2="21" stroke="#E89B4A" stroke-width="3"/>
    <line x1="44" y1="32" x2="64" y2="32" stroke="#C9A227" stroke-width="3"/>
    <line x1="44" y1="32" x2="64" y2="43" stroke="#5A8DA8" stroke-width="3"/>
    <line x1="44" y1="32" x2="64" y2="54" stroke="#3D4A6B" stroke-width="3"/>
  </g>
</svg>
