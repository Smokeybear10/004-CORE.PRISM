<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PRISM — Demo Redesign · Variations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500;1,8..60,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:    #fbfaf6;
    --paper-2:  #f4f3ee;
    --paper-3:  #e8e6dd;
    --rule:     #dcd9cf;
    --rule-2:   #b8b4a6;

    --navy:     #0a1d36;
    --navy-2:   #1a2c47;
    --navy-soft: rgba(10,29,54,0.06);
    --navy-line: rgba(10,29,54,0.18);

    --ink:      #0d1320;
    --ink-2:    #2c3344;
    --ink-q:    #6a6e7c;
    --ink-dim:  #989384;

    --oxblood:  #7a1f1f;
    --oxblood-2:#5a1414;
    --oxblood-soft: rgba(122,31,31,0.08);
    --oxblood-line: rgba(122,31,31,0.30);

    --gold:     #a87c3d;
    --up:       #2e6f48;
    --up-soft:  rgba(46,111,72,0.08);
    --up-line:  rgba(46,111,72,0.30);
    --down:     #8c2f2f;
    --down-soft: rgba(140,47,47,0.08);
    --down-line: rgba(140,47,47,0.30);

    /* The 5 dimension colors. These ARE the brand. */
    --d1: #C8442C; /* demand */
    --d2: #E89B4A; /* pricing */
    --d3: #D4B85A; /* competitive */
    --d4: #5A8DA8; /* mgmt */
    --d5: #3D4A6B; /* macro */

    --serif: 'Source Serif 4','Iowan Old Style', Georgia, serif;
    --sans:  'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono:  'JetBrains Mono', ui-monospace, monospace;

    --r-md: 6px;
    --r-sm: 4px;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: #efece4;
    color: var(--ink);
    font: 400 14px/1.5 var(--sans);
    font-feature-settings: 'tnum' 1;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ════════════════════════════════════════════════════════════
     Shared brand & primitives
     ═══════════════════════════════════════════════════════════ */

  .spectrum-strip {
    display: flex;
    height: 4px;
  }
  .spectrum-strip > span { flex: 1; }
  .spectrum-strip > span:nth-child(1) { background: var(--d1); }
  .spectrum-strip > span:nth-child(2) { background: var(--d2); }
  .spectrum-strip > span:nth-child(3) { background: var(--d3); }
  .spectrum-strip > span:nth-child(4) { background: var(--d4); }
  .spectrum-strip > span:nth-child(5) { background: var(--d5); }

  .wordmark {
    font-family: var(--serif);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--navy);
    line-height: 1;
  }
  .wordmark .dot { color: var(--oxblood); }

  /* shared chart wrapper sizing */
  .chart-frame { position: relative; width: 100%; }
  .chart-frame svg { display: block; width: 100%; }

  /* ════════════════════════════════════════════════════════════
     VARIANT A — Editorial Front Page
     Single-column long-form, prism wordmark, verdict hero,
     5-color dimension stack as visual climax under the chart.
     Sized: 1200 wide, free-height
     ═══════════════════════════════════════════════════════════ */

  .va {
    width: 1200px;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
  }

  /* — Masthead — */
  .va-mast {
    border-bottom: 2px solid var(--navy);
    padding: 26px 56px 22px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 32px;
    align-items: end;
    background: rgba(251,250,246,0.95);
  }
  .va-mast .brand {
    display: flex; align-items: baseline; gap: 14px;
  }
  .va-mast .brand .wordmark { font-size: 24px; }
  .va-mast .brand .tag {
    font: italic 400 13px var(--serif);
    color: var(--ink-q);
  }
  .va-mast .ticker-row {
    display: flex; gap: 0; justify-self: center;
    border-left: 1px solid var(--rule);
    border-right: 1px solid var(--rule);
  }
  .va-mast .tk {
    padding: 8px 16px;
    font: 600 11px var(--mono);
    letter-spacing: 0.08em;
    color: var(--ink-q);
    background: transparent;
    border: none;
    border-right: 1px solid var(--rule);
    cursor: pointer;
  }
  .va-mast .tk:last-child { border-right: none; }
  .va-mast .tk.active {
    background: var(--navy);
    color: #fff;
  }
  .va-mast .tk:hover:not(.active) { background: var(--paper-2); color: var(--ink); }
  .va-mast .meta {
    text-align: right;
    font: 500 10px var(--mono);
    color: var(--ink-q);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .va-mast .meta .live {
    display: inline-flex; gap: 6px; align-items: center;
    color: var(--up); font-weight: 600;
  }
  .va-mast .meta .live .pulse {
    width: 6px; height: 6px; border-radius: 99px; background: var(--up);
    box-shadow: 0 0 0 0 rgba(46,111,72,0.4);
    animation: pulse 1.6s infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(46,111,72,0.5); }
    70%  { box-shadow: 0 0 0 7px rgba(46,111,72,0); }
    100% { box-shadow: 0 0 0 0 rgba(46,111,72,0); }
  }
  .va-mast .iso { color: var(--navy); font-weight: 600; }

  /* — Section header — */
  .va-section-head {
    padding: 36px 56px 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 32px;
    align-items: end;
    border-bottom: 1px solid var(--rule);
  }
  .va-section-head .eyebrow {
    font: 600 11px var(--mono);
    letter-spacing: 0.22em;
    color: var(--oxblood);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .va-section-head h1 {
    margin: 0;
    font-family: var(--serif);
    font-weight: 500;
    font-size: 56px;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--ink);
  }
  .va-section-head h1 em {
    font-style: italic;
    color: var(--oxblood);
  }
  .va-section-head .byline {
    font: italic 400 14px var(--serif);
    color: var(--ink-q);
    margin-top: 10px;
    max-width: 56ch;
  }
  .va-section-head .ticker-stat {
    text-align: right;
  }
  .va-section-head .ticker-stat .lbl {
    font: 600 10px var(--mono);
    letter-spacing: 0.18em;
    color: var(--ink-q);
    text-transform: uppercase;
  }
  .va-section-head .ticker-stat .price {
    font: 500 36px var(--serif);
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .va-section-head .ticker-stat .delta {
    font: 600 13px var(--mono);
    color: var(--up);
    letter-spacing: 0.04em;
  }
  .va-section-head .ticker-stat .delta.down { color: var(--down); }

  /* — Chart card — */
  .va-chart-wrap {
    padding: 28px 56px 22px;
    border-bottom: 1px solid var(--rule);
  }
  .va-chart-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 16px;
  }
  .va-chart-head .label {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 18px;
    color: var(--ink);
  }
  .va-chart-head .label em { font-style: italic; color: var(--ink-q); font-weight: 400; }
  .va-chart-head .legend {
    display: flex; gap: 18px;
    font: 500 11px var(--mono);
    letter-spacing: 0.06em;
    color: var(--ink-q);
  }
  .va-chart-head .legend .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 99px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .va-chart {
    position: relative;
    width: 100%;
    height: 280px;
    background:
      linear-gradient(to bottom, transparent 0, transparent calc(100% - 1px), var(--rule) 100%),
      repeating-linear-gradient(to bottom, transparent 0 56px, var(--paper-2) 56px 57px);
  }

  /* — Verdict block — */
  .va-verdict {
    padding: 44px 56px 36px;
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    gap: 56px;
    border-bottom: 1px solid var(--rule);
    background:
      linear-gradient(to bottom, var(--paper) 0%, var(--paper-2) 100%);
    position: relative;
  }
  .va-verdict .lbl {
    font: 600 10px var(--mono);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--oxblood);
    margin-bottom: 14px;
  }
  .va-verdict .case-meta {
    font: 500 12px var(--mono);
    color: var(--ink-q);
    letter-spacing: 0.04em;
    margin-bottom: 8px;
  }
  .va-verdict .case-meta .ret {
    font-weight: 700;
    color: var(--down);
    margin-left: 8px;
  }
  .va-verdict .case-meta .z { color: var(--ink); }

  .va-verdict .word {
    font-family: var(--serif);
    font-weight: 500;
    font-style: italic;
    font-size: 156px;
    line-height: 0.88;
    letter-spacing: -0.045em;
    color: var(--down);
    margin: 8px 0 14px;
  }
  .va-verdict .reason {
    font: 400 19px/1.45 var(--serif);
    color: var(--ink-2);
    max-width: 50ch;
  }
  .va-verdict .reason em { color: var(--oxblood); font-style: italic; }
  .va-verdict .reason .num {
    font-family: var(--mono); font-weight: 500;
    font-size: 16px; font-style: normal;
    color: var(--ink);
  }

  /* Ledger card on the right of verdict */
  .va-ledger {
    border: 1px solid var(--rule-2);
    border-radius: var(--r-md);
    background: var(--paper);
    padding: 18px 20px;
  }
  .va-ledger .ledger-h {
    display: flex; justify-content: space-between; align-items: baseline;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 10px;
  }
  .va-ledger .ledger-h .ttl {
    font: 600 10px var(--mono);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-q);
  }
  .va-ledger .ledger-h .case {
    font: italic 500 12px var(--serif);
    color: var(--ink-q);
  }

  .lr {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: baseline;
    padding: 9px 0;
    border-bottom: 1px dashed var(--rule);
  }
  .lr:last-child { border-bottom: none; }
  .lr .k {
    font: 500 11px var(--mono);
    letter-spacing: 0.14em;
    color: var(--ink-q);
    text-transform: uppercase;
  }
  .lr .v {
    font: 500 14px var(--serif);
    color: var(--ink);
  }
  .lr .v.mono { font: 600 13px var(--mono); letter-spacing: 0.02em; }
  .lr .v.up { color: var(--up); }
  .lr .v.down { color: var(--down); }
  .lr .v.tag {
    font: 600 10px var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 3px;
    background: var(--down-soft);
    color: var(--down);
    border: 1px solid var(--down-line);
  }
  .lr .v.tag.struct { background: var(--navy-soft); color: var(--navy); border-color: var(--navy-line); }

  /* — The Prism Stack: this is where the brand colors LIVE — */
  .va-prism {
    padding: 44px 56px 12px;
    border-bottom: 1px solid var(--rule);
  }
  .va-prism .ph {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 22px;
  }
  .va-prism .ph .ttl {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    color: var(--ink);
  }
  .va-prism .ph .ttl em { font-style: italic; color: var(--ink-q); }
  .va-prism .ph .meta {
    font: 500 11px var(--mono);
    letter-spacing: 0.1em;
    color: var(--ink-q);
  }

  /* The 5 dimension rows — full editorial treatment */
  .dim-row {
    display: grid;
    grid-template-columns: 18px 200px 1fr 90px;
    gap: 22px;
    align-items: start;
    padding: 22px 0;
    border-top: 1px solid var(--rule);
  }
  .dim-row:first-of-type { border-top: 2px solid var(--ink); padding-top: 24px; }
  .dim-row .swatch {
    width: 6px;
    height: 100%;
    min-height: 56px;
    border-radius: 1px;
  }
  .dim-row .name-block .name {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 22px;
    color: var(--ink);
    letter-spacing: -0.01em;
    line-height: 1.05;
    margin-bottom: 4px;
  }
  .dim-row .name-block .sub {
    font: 500 10px var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-q);
  }
  .dim-row .body {
    display: grid;
    gap: 8px;
  }
  .dim-row .body .rationale {
    font: 400 14.5px/1.5 var(--serif);
    color: var(--ink-2);
  }
  .dim-row .body .quote {
    font: italic 400 13.5px/1.5 var(--serif);
    color: var(--ink);
    border-left: 2px solid;
    padding: 2px 0 2px 14px;
    margin-top: 6px;
  }
  .dim-row .body .cite {
    font: 500 10.5px var(--mono);
    letter-spacing: 0.04em;
    color: var(--ink-q);
    margin-top: 6px;
  }
  .dim-row .body .cite code {
    font-weight: 600;
    color: inherit;
    background: var(--paper-2);
    padding: 1px 6px;
    border-radius: 3px;
  }
  .dim-row .stat {
    text-align: right;
    align-self: start;
  }
  .dim-row .stat .w {
    font-family: var(--serif);
    font-weight: 500;
    font-size: 36px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  .dim-row .stat .dir {
    font: 600 10px var(--mono);
    letter-spacing: 0.18em;
    color: var(--ink-q);
    margin-top: 6px;
    text-transform: uppercase;
  }
  .dim-row .stat .dir.pos { color: var(--up); }
  .dim-row .stat .dir.neg { color: var(--down); }

  /* color-bind each dim */
  .dim-row.d-demand     .swatch { background: var(--d1); } .dim-row.d-demand     .body .quote { border-color: var(--d1); }
  .dim-row.d-pricing    .swatch { background: var(--d2); } .dim-row.d-pricing    .body .quote { border-color: var(--d2); }
  .dim-row.d-competitive .swatch { background: var(--d3); } .dim-row.d-competitive .body .quote { border-color: var(--d3); }
  .dim-row.d-mgmt       .swatch { background: var(--d4); } .dim-row.d-mgmt       .body .quote { border-color: var(--d4); }
  .dim-row.d-macro      .swatch { background: var(--d5); } .dim-row.d-macro      .body .quote { border-color: var(--d5); }

  /* Prism diagram inside the dim-stack header */
  .va-prism-anatomy {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 28px;
    align-items: end;
    margin-bottom: 8px;
  }
  .va-prism-anatomy .lede {
    font: 500 16px/1.5 var(--serif);
    color: var(--ink-2);
    max-width: 46ch;
  }
  .va-prism-anatomy .lede em { color: var(--oxblood); font-style: italic; }
  .va-prism-anatomy svg { width: 360px; height: 130px; display: block; }

  /* — Sources tape — */
  .va-sources {
    padding: 32px 56px 28px;
    background: var(--paper-2);
    border-bottom: 1px solid var(--rule);
  }
  .va-sources .sh {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
  }
  .va-sources .sh .ttl {
    font: 500 14px var(--serif);
    color: var(--ink);
  }
  .va-sources .sh .meta {
    font: 500 11px var(--mono);
    color: var(--ink-q);
    letter-spacing: 0.04em;
  }
  .va-sources .sh .meta .num { color: var(--oxblood); font-weight: 700; }
  .va-sources .row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .va-sources .src {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: var(--r-sm);
    padding: 10px 12px;
    cursor: pointer;
  }
  .va-sources .src.on {
    border-color: var(--oxblood);
    background: var(--oxblood-soft);
  }
  .va-sources .src .name {
    font: 500 12px var(--serif);
    color: var(--ink);
  }
  .va-sources .src.on .name { color: var(--oxblood); font-weight: 600; }
  .va-sources .src .count {
    font: 500 10px var(--mono);
    color: var(--ink-q);
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .va-foot {
    padding: 14px 56px;
    font: 500 10px var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-q);
    display: flex; justify-content: space-between;
    border-top: 2px solid var(--navy);
  }

  /* ════════════════════════════════════════════════════════════
     VARIANT B — The Prism Console
     The methodology metaphor LIVES inside the product:
     incoming move beam splits into 5 colored beams, each beam
     IS a dimension card. The most "prism lands hard" of any.
     ═══════════════════════════════════════════════════════════ */

  .vb {
    width: 1280px;
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    overflow: hidden;
  }

  .vb-mast {
    padding: 18px 36px;
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--navy);
    background:
      linear-gradient(to right,
        var(--d1) 0, var(--d1) 1px, transparent 1px,
        transparent calc(100% - 1px), var(--d5) calc(100% - 1px), var(--d5) 100%);
    background-color: var(--paper);
  }
  .vb-mast .brand {
    display: flex; align-items: baseline; gap: 16px;
  }
  .vb-mast .brand .wordmark { font-size: 22px; }
  .vb-mast .brand .tag {
    font: italic 400 12px var(--serif);
    color: var(--ink-q);
  }
  .vb-mast .ticker-row { display: flex; gap: 4px; }
  .vb-mast .tk {
    padding: 6px 14px;
    border: 1px solid var(--rule);
    border-radius: 999px;
    font: 600 11px var(--mono);
    letter-spacing: 0.06em;
    background: transparent;
    color: var(--ink-q);
    cursor: pointer;
  }
  .vb-mast .tk.active { background: var(--navy); color: #fff; border-color: var(--navy); }
  .vb-mast .status {
    font: 500 11px var(--mono);
    color: var(--ink-q);
    letter-spacing: 0.06em;
    display: flex; gap: 16px; align-items: center;
  }
  .vb-mast .status .iso { color: var(--navy); font-weight: 600; }

  /* Header strip */
  .vb-strip {
    padding: 22px 36px;
    display: grid;
    grid-template-columns: auto auto 1fr auto;
    gap: 28px;
    align-items: end;
    border-bottom: 1px solid var(--rule);
  }
  .vb-strip .tk-name {
    font: 500 36px var(--serif);
    letter-spacing: -0.01em;
    color: var(--ink);
    line-height: 1;
  }
  .vb-strip .tk-name em { font-style: italic; color: var(--ink-q); font-weight: 400; }
  .vb-strip .case {
    font: 500 11px var(--mono);
    letter-spacing: 0.16em;
    color: var(--ink-q);
    text-transform: uppercase;
    align-self: end;
    padding-bottom: 4px;
  }
  .vb-strip .case .num { color: var(--ink); font-weight: 700; }
  .vb-strip .verdict-mini {
    text-align: right;
    align-self: end;
  }
  .vb-strip .verdict-mini .lbl {
    font: 600 10px var(--mono);
    letter-spacing: 0.22em;
    color: var(--oxblood);
    text-transform: uppercase;
  }
  .vb-strip .verdict-mini .word {
    font: italic 500 44px var(--serif);
    color: var(--down);
    letter-spacing: -0.03em;
    line-height: 1;
    margin-top: 4px;
  }

  /* THE PRISM CANVAS — the centerpiece */
  .vb-canvas {
    position: relative;
    padding: 32px 36px 20px;
    background:
      radial-gradient(ellipse 1100px 700px at 28% 50%, rgba(255,255,255,0.55), transparent 60%),
      var(--paper-2);
    border-bottom: 1px solid var(--rule);
  }
  .vb-canvas .canvas-h {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 14px;
  }
  .vb-canvas .canvas-h .ttl {
    font: 500 14px var(--serif);
    color: var(--ink);
  }
  .vb-canvas .canvas-h .ttl em { color: var(--ink-q); font-style: italic; }
  .vb-canvas .canvas-h .conf {
    font: 500 11px var(--mono);
    color: var(--ink-q);
    letter-spacing: 0.06em;
  }
  .vb-canvas .canvas-h .conf .num { color: var(--ink); font-weight: 700; }

// ────────────── Chart helpers ──────────────
function PriceChart({ width = 1090, height = 280, padTop = 18, padBot = 28, padLeft = 44, padRight = 16 }) {
  const xs = PRICES.map(p => new Date(p[0]).getTime());
  const ys = PRICES.map(p => p[1]);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys) * 0.92;
  const yMax = Math.max(...ys) * 1.04;
  const px = t => padLeft + ((t - xMin) / (xMax - xMin)) * (width - padLeft - padRight);
  const py = v => padTop  + (1 - (v - yMin) / (yMax - yMin)) * (height - padTop - padBot);

  const path = PRICES.map((p, i) => {
    const x = px(new Date(p[0]).getTime()).toFixed(1);
    const y = py(p[1]).toFixed(1);
    return `${i === 0 ? 'M' : 'L'}${x},${y}`;
  }).join(' ');

  // baseline area for soft fill
  const baselineY = py(yMin).toFixed(1);
  const area = `${path} L${px(xMax).toFixed(1)},${baselineY} L${px(xMin).toFixed(1)},${baselineY} Z`;

  // y-axis labels
  const yTicks = [yMin, (yMin + yMax) / 2, yMax].map(v => Math.round(v / 10) * 10);
  // x-axis: years
  const yearTicks = ["2024-10-01", "2025-01-01", "2025-04-01", "2025-07-01", "2025-10-01", "2026-01-01", "2026-04-01"];

  return (
    <svg viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="none" style={{ width: "100%", height: "100%", display: "block" }}>
      {/* horizontal grid */}
      {yTicks.map((v, i) => (
        <g key={i}>
          <line x1={padLeft} x2={width - padRight} y1={py(v)} y2={py(v)} stroke="var(--rule)" strokeDasharray="2 4" />
          <text x={padLeft - 8} y={py(v) + 3} textAnchor="end" fill="var(--ink-q)" style={{ font: "500 10px JetBrains Mono", letterSpacing: ".04em" }}>
            ${v}
          </text>
        </g>
      ))}
      {/* x year ticks */}
      {yearTicks.map((d, i) => {
        const t = new Date(d).getTime();
        if (t < xMin || t > xMax) return null;
        const x = px(t);
        const label = new Date(d).toLocaleDateString("en-US", { month: "short", year: "2-digit" });
        return (
          <g key={i}>
            <line x1={x} x2={x} y1={height - padBot} y2={height - padBot + 4} stroke="var(--rule-2)" />
            <text x={x} y={height - padBot + 16} textAnchor="middle" fill="var(--ink-q)" style={{ font: "500 10px JetBrains Mono", letterSpacing: ".04em" }}>
              {label}
            </text>
          </g>
        );
      })}
      {/* area + line */}
      <path d={area} fill="var(--navy)" opacity="0.05" />
      <path d={path} fill="none" stroke="var(--navy)" strokeWidth="1.6" />

      {/* flagged moves */}

        const t = new Date(f.date).getTime();

          <div className="ttl">The Prism · <em>five evidence streams, one move</em></div>
          <div className="meta">75 chunks · 7/7 sources active</div>
        </div>

        <div className="va-prism-anatomy">
          <p className="lede">
            A 17-point drop is one signal. The text around it has structure.
            Read across — the longer the bar, the larger that dimension's share
            of the model's explanation. <em>Macro dominates.</em>
          </p>
          <MiniPrism />
        </div>

        {DIMS.map(d => (
          <div key={d.key} className={`dim-row d-${d.key}`}>
            <div className="swatch"/>
            <div className="name-block">
              <div className="name">{d.name}</div>
              <div className="sub">{d.sub}</div>
            </div>
            <div className="body">
              <div className="rationale">{d.rationale}</div>
              <div className="quote">&ldquo;{d.quote}&rdquo;</div>
              <div className="cite">CITED <code>{d.chunk}</code></div>
            </div>
            <div className="stat">
              <div className="w">{(d.weight * 100).toFixed(0)}%</div>
              <div className={`dir ${d.direction === "negative" ? "neg" : d.direction === "positive" ? "pos" : ""}`}>
                {d.direction === "negative" ? "↓ Negative" : d.direction === "positive" ? "↑ Positive" : "→ Neutral"}
              </div>
            </div>
          </div>
        ))}
      </section>

      <section className="va-sources">
        <div className="sh">
          <div className="ttl">Sources feeding the model</div>
          <div className="meta"><span className="num">75</span> chunks across <span className="num">6</span> active streams · toggle to ablate</div>
        </div>
        <div className="row">
          {SOURCES.map(s => (
            <div key={s.id} className={`src ${s.on ? "on" : ""}`}>
              <div className="name">{s.label}</div>
              <div className="count">{s.count} chunks</div>
            </div>
          ))}
        </div>
      </section>

      <footer className="va-foot">
        <div>PRISM · Bridgewater Hackathon Track 01</div>
        <div>Cited evidence · No hallucinations · Coherence-checked</div>
      </footer>
      <div className="spectrum-strip" style={{height:"3px"}}><span/><span/><span/><span/><span/></div>
    </div>
  );
}

// ────────────── VARIANT B — The Prism Console ──────────────
function VariantB() {
  // The beam SVG. Sized to fill 60px-wide vertical strip × full canvas height.
  // Beams emanate from a triangle on the left side and reach to the 5 cards
  // stacked on the right. We compute Y endpoints to match each card's vertical center.
  const beamW = 60;
  const beamH = 520;
  const apexX = beamW; // far right edge of strip = prism apex
  const apexY = beamH / 2;
  const baseX = 8;
  const triTop = apexY - 70, triBot = apexY + 70;
  const cardHt = (beamH - 4 * 6) / 5; // 5 cards with 6px gaps
  const beamTargets = DIMS.map((d, i) => ({
    color: d.color,
    y: cardHt / 2 + i * (cardHt + 6) + 0,
  }));

  return (
    <div className="vb">
      <header className="vb-mast">
        <div className="brand">
          <div className="wordmark">PRISM<span className="dot">.</span></div>
          <div className="tag">Persistence Reasoning over Idiosyncratic Stock Moves</div>
        </div>
        <div className="ticker-row">
          {["ABT","ACU","AIR","AMD","APD"].map(t => (
            <button key={t} className={`tk ${t === "AMD" ? "active" : ""}`}>{t}</button>
          ))}
        </div>
        <div className="status">
          <span>04 FEB 2026 · <span className="iso">17:32 ET</span></span>
          <span style={{color:"var(--up)", fontWeight:600}}>● live</span>
        </div>
      </header>

      <section className="vb-strip">
        <div className="tk-name">AMD <em>· Advanced Micro Devices</em></div>
        <div className="case">CASE <span className="num">№14</span> · 04 Feb 2026 · z=−5.27</div>
        <div></div>
        <div className="verdict-mini">
          <div className="lbl">Verdict</div>
          <div className="word">Fade.</div>
        </div>
      </section>

      <section className="vb-canvas">
        <div className="canvas-h">
          <div className="ttl">The Prism · <em>one move splits across five evidence streams</em></div>
          <div className="conf">Confidence <span className="num">71%</span> · Coherence ✓ · 75 chunks considered</div>
        </div>

        <div className="prism-grid">
          {/* LEFT: incoming move */}
          <div className="prism-left">
            <div className="prism-event">
              <div className="lbl">Incoming · price action</div>
              <div className="date">04 FEB 2026<br/>Tuesday</div>
              <div className="ret">−17.31%</div>
              <div className="grid">
                <div className="k">z-score</div><div className="v">−5.27</div>
                <div className="k">Vol. rank</div><div className="v">99.4%</div>
                <div className="k">Realized</div><div className="v">−17.31%</div>
                <div className="k">Predicted</div><div className="v">−8.40%</div>
                <div className="k">Overshoot</div><div className="v" style={{color:"var(--down)"}}>−8.91pp</div>
                <div className="k">Character</div><div className="v" style={{color:"var(--down)"}}>transient</div>
              </div>
            </div>
          </div>

          {/* MIDDLE: beam SVG */}
          <div className="prism-beam">
            <svg viewBox={`0 0 ${beamW} ${beamH}`} preserveAspectRatio="none">
              {/* incoming bar from the event card → prism */}
              <rect x="0" y={apexY - 5} width={baseX} height="10" fill="var(--navy)" />
              {/* prism triangle */}
              <polygon
                points={`${baseX},${triTop} ${baseX},${triBot} ${apexX - 1},${apexY}`}
                fill="rgba(10,29,54,0.04)" stroke="var(--navy)" strokeWidth="1.4"
              />
              {/* exiting beams — one per dim */}
              {beamTargets.map((b, i) => (
                <line key={i}
                  x1={apexX - 1} y1={apexY}
                  x2={beamW + 80} y2={b.y}
                  stroke={b.color} strokeWidth="4" strokeLinecap="round"
                  opacity="0.85"
                />
              ))}
            </svg>
          </div>

          {/* RIGHT: 5 dimension cards as exiting beams */}
          <div className="prism-right">
            {DIMS.map(d => (
              <div key={d.key} className={`beam-card d-${d.key}`}>
                <div className="name-stack">
                  <div className="name">{d.name}</div>
                  <div className="sub">{d.sub}</div>
                </div>
                <div className="quote">
                  &ldquo;{d.quote}&rdquo;
                  <span className="cite">{d.chunk}</span>
                </div>
                <div className="stat">
                  <div className="w">{(d.weight * 100).toFixed(0)}%</div>
                  <div className={`dir ${d.direction === "negative" ? "neg" : d.direction === "positive" ? "pos" : ""}`}>
                    {d.direction === "negative" ? "↓ neg" : d.direction === "positive" ? "↑ pos" : "→ neu"}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="vb-bottom">
        <div className="vb-chart">
          <div className="ch">
            <div className="ttl">5-year tape · flagged moves</div>
            <div className="legend">
              <span><span className="dot" style={{background:"var(--up)"}}/>up</span>
              <span><span className="dot" style={{background:"var(--down)"}}/>down</span>
              <span><span className="dot" style={{background:"var(--navy)"}}/>close</span>
            </div>
          </div>
          <div className="chart-frame"><PriceChart width={780} height={240}/></div>
        </div>

        <aside className="vb-strats">
          <div className="ch">Strategy verdicts</div>

          <div className="strat active">
            <div className="n">Fundamental vs Non-fundamental</div>
            <div className="vrd fade">Fade</div>
            <div className="b">Macro-driven move ⇒ historically reverts within 5 sessions.</div>
          </div>
          <div className="strat">
            <div className="n">Expected vs Realized</div>
            <div className="vrd fade">Fade</div>
            <div className="b">Realized −17.31% vs predicted −8.40% — 8.9pp overshoot to fade.</div>
          </div>
          <div className="strat">
            <div className="n">Hybrid (3-stage)</div>
            <div className="vrd fade">Fade</div>
            <div className="b">Passes fundamental check → catches overshoot → confirms.</div>
          </div>
          <div className="strat">
            <div className="n">Persistence-weighted</div>
            <div className="vrd skip">Skip</div>
            <div className="b">Top dim (macro) historically anti-persistent — defer to next print.</div>
          </div>
        </aside>
      </section>

      <footer className="vb-foot">
        <div>PRISM Console · v0.3 · Live</div>
        <div>cache hit · 4ms · 75 chunks · attribution gate ✓</div>
      </footer>
    </div>
  );
}

// ────────────── Mount ──────────────
function App() {
  return (
    <DesignCanvas title="PRISM · Demo redesign — Bloomberg Editorial · Real AMD case (04 Feb 2026, −17.31%)">
      <DCSection id="prism-redesign" title="Redesigned demo views">
        <DCArtboard id="va" label="01 · Editorial Front Page" width={1200} height={2240}>
          <VariantA/>
        </DCArtboard>
        <DCArtboard id="vb" label="02 · The Prism Console" width={1280} height={1100}>
          <VariantB/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<div id="root"></div>
</body>
</html>
