<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variant B — Research Note</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;1,8..60,400;1,8..60,500;1,8..60,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #fafaf7;
      --paper-2: #f4f5f7;
      --rule: #e2e3e7;
      --rule-strong: #b6bac4;
      --navy: #0a1d36;
      --ink: #0d1320;
      --ink-2: #2c3344;
      --ink-quiet: #6a6e7c;
      --ink-dim: #989384;
      --oxblood: #7a1f1f;
      --gold: #a87c3d;
      --serif: 'Source Serif 4', 'Iowan Old Style', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100vh; overflow: hidden; }
    body {
      background:
        radial-gradient(1200px 700px at 20% -20%, rgba(168, 124, 61, 0.04), transparent 60%),
        var(--paper);
      color: var(--ink);
      font-family: var(--sans);
      font-feature-settings: 'tnum' 1;
      -webkit-font-smoothing: antialiased;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
    }

    /* Minimal top rail */
    .top-rail {
      padding: 28px 80px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font: 500 11px var(--mono);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-quiet);
    }
    .top-rail .brand { color: var(--navy); font-weight: 600; }
    .top-rail .brand .ox { color: var(--oxblood); }

    /* Stage — minimal, generous whitespace, left-aligned */
    .stage {
      padding: 0 80px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      max-width: 1100px;
      width: 100%;
      margin-left: 12%;
    }

    .kicker {
      font: 500 10px var(--mono);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--ink-quiet);
      margin-bottom: 48px;
    }

    .title {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(4rem, 7.5vw, 6rem);
      line-height: 0.98;
      letter-spacing: -0.025em;
      color: var(--navy);
      margin-bottom: 36px;
    }
    .title .period { color: var(--oxblood); }

    .sub {
      font-family: var(--serif);
      font-weight: 400;
      font-style: italic;
      font-size: 1.5rem;
      line-height: 1.5;
      color: var(--ink-2);
      max-width: 580px;
    }
    .sub .em {
      font-style: normal;
      font-weight: 600;
      color: var(--oxblood);
    }

    /* Footer */
    .footer {
      padding: 28px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font: 500 11px var(--mono);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-quiet);
    }
    .footer .cta { color: var(--navy); animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.45; } 50% { opacity: 1; } }
  </style>
</head>
<body>

  <div class="top-rail">
    <span class="brand">PRISM<span class="ox">.</span></span>
    <span>2026 · 04 · 25</span>
  </div>

  <main class="stage">
    <div class="kicker">BW Hackathon · Track 01</div>

    <h1 class="title">
      Financial<br>
      Historian<span class="period">.</span>
    </h1>

    <p class="sub">
      An equity price-action tagger. We decompose the language around every significant move into five measurable dimensions, with citations &mdash; and decide: <span class="em">lean</span>, or <span class="em">fade</span>.
    </p>
  </main>

  <footer class="footer">
    <span class="cta">click to begin →</span>
    <span>01 / 05</span>
  </footer>

</body>
</html>
